[supervisord]  
nodaemon=true  
  
[program:update]  
command=/bin/bash /app/update.sh  
autostart=true  
autorestart=true  
startsecs=5  
startretries=3  
stderr_logfile=/dev/stderr  
stdout_logfile=/dev/stdout  
stdout_logfile_maxbytes=0  
stderr_logfile_maxbytes=0  
  
[program:gunicorn]  
command=gunicorn -b 0.0.0.0:9000 webhook:app  
autostart=true  
autorestart=true  
startsecs=10  
startretries=5  
stderr_logfile=/dev/stderr  
stdout_logfile=/dev/stdout  
stdout_logfile_maxbytes=0  
stderr_logfile_maxbytes=0  
  
[program:bot]  
command=python3 bot.py  
autostart=true  
autorestart=unexpected  
startsecs=7  
startretries=3  
stderr_logfile=/dev/stderr  
stdout_logfile=/dev/stdout  
stdout_logfile_maxbytes=0  
stderr_logfile_maxbytes=0