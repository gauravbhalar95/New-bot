[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=5
pidfile=/var/run/supervisord.pid

[program:bot]
command=python3 /app/bot.py
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/bot.err.log
stdout_logfile=/var/log/bot.out.log

[program:webhook]
command=python3 /app/webhook.py
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/webhook.err.log
stdout_logfile=/var/log/webhook.out.log

[group:my_services]
programs=bot,webhook