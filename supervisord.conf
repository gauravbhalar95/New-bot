[supervisord]
nodaemon=true

[program:bot]
command=python3 bot.py
autostart=true
autorestart=true
exitcodes=0
stderr_logfile=/var/log/bot.err.log
stdout_logfile=/var/log/bot.out.log

[program:webhook]
command=python3 webhook.py
autostart=true
autorestart=true
exitcodes=0
stderr_logfile=/var/log/webhook.err.log
stdout_logfile=/var/log/webhook.out.log

[program:update]
command=bash update.sh
autostart=true
autorestart=true
exitcodes=0
stderr_logfile=/var/log/update.err.log
stdout_logfile=/var/log/update.out.log

[program:update]
command=bash install_ffmpeg.sh
autostart=true
autorestart=true
exitcodes=0
stderr_logfile=/var/log/install_ffmpeg.err.log
stdout_logfile=/var/log/install_ffmpeg.out.log
